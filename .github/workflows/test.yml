name: Tests & credential validation

on:
  push:
    branches: [main]
    paths: ["engine/**", "content/calendar.json", "tests/**", "requirements.txt"]
  pull_request:
  workflow_dispatch:
    inputs:
      validate_credentials:
        description: "Also validate X + Instagram credentials (needs secrets)"
        type: boolean
        default: false

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          pip install -r requirements.txt pytest
          sudo apt-get update && sudo apt-get install -y ffmpeg fonts-dejavu-core
      - name: Run test suite
        run: pytest tests/ -v

  validate-credentials:
    if: ${{ inputs.validate_credentials }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Validate X credentials
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
        run: python scripts/validate_x.py
      - name: Validate Instagram credentials + media fetch
        env:
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          MEDIA_BASE_URL: https://raw.githubusercontent.com/${{ github.repository }}/main
        run: python scripts/validate_ig.py --container
